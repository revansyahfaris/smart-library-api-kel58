<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Library - Kelompok 58</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #218838; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Peminjaman Buku</h2>
    <div class="form-group">
        <label>ID Buku:</label>
        <input type="number" id="bookId" placeholder="Contoh: 1">
    </div>
    <div class="form-group">
        <label>ID Anggota:</label>
        <input type="number" id="memberId" placeholder="Contoh: 1">
    </div>
    <div class="form-group">
        <label>Tanggal Jatuh Tempo:</label>
        <input type="date" id="dueDate">
    </div>
    <button onclick="submitLoan()">Pinjam Buku</button>

    <div id="message"></div>
</div>

<script>
    async function submitLoan() {
        const book_id = document.getElementById('bookId').value;
        const member_id = document.getElementById('memberId').value;
        const due_date = document.getElementById('dueDate').value;
        const msgDiv = document.getElementById('message');

        try {
            // Memanggil API yang sudah Anda buat
            const response = await fetch('http://localhost:3000/api/loans', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ book_id, member_id, due_date })
            });

            const result = await response.json();

            msgDiv.style.display = 'block';
            if (response.ok) {
                msgDiv.style.backgroundColor = '#d4edda';
                msgDiv.style.color = '#155724';
                msgDiv.innerText = result.message; // "Peminjaman berhasil dicatat!"
            } else {
                msgDiv.style.backgroundColor = '#f8d7da';
                msgDiv.style.color = '#721c24';
                msgDiv.innerText = "Gagal: " + result.error;
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Gagal terhubung ke server API!");
        }
    }
</script>

</body>
</html>
